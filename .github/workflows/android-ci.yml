name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle-Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Lint ausführen
        run: ./gradlew lint --no-daemon

      - name: Lint-Bericht hochladen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html

  build:
    name: Debug Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle-Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Debug-APK bauen
        run: ./gradlew assembleDebug --no-daemon

      - name: Debug-APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
