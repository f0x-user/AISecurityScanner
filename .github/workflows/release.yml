name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release-APK erstellen und veröffentlichen
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle-Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Keystore aus Secret dekodieren
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Release-APK bauen und signieren
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: APK umbenennen
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/SecurityScanner-${{ github.ref_name }}.apk

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/SecurityScanner-${{ github.ref_name }}.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
